<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>心庭 — こころにわ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
<style>
/* === RESET & BASE === */
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: #f5f0e8;
  color: #2c2c2c;
  overflow: hidden;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* === HEADER === */
.header {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 8px 16px;
  background: #f5f0e8;
  border-bottom: 1px solid #d4c9b8;
  z-index: 10;
  position: relative;
}
.header-title {
  font-family: 'Noto Serif JP', serif;
  font-weight: 700;
  font-size: 24px;
  color: #2c2c2c;
  letter-spacing: 0.15em;
}
.header-subtitle {
  font-family: 'Noto Serif JP', serif;
  font-weight: 400;
  font-size: 12px;
  color: #7a6a5a;
  margin-left: 12px;
}
.header-actions {
  position: absolute;
  right: 16px;
  display: flex;
  gap: 8px;
}
.header-btn {
  background: none;
  border: 1px solid #c4b8a6;
  border-radius: 4px;
  padding: 4px 10px;
  font-size: 14px;
  cursor: pointer;
  color: #7a6a5a;
  transition: background 0.2s;
}
.header-btn:hover { background: #e8e0d2; }

/* === CANVAS AREA === */
#canvas-container {
  flex: 1;
  position: relative;
  overflow: hidden;
}
#canvas-container canvas {
  display: block;
  width: 100%;
  height: 100%;
}
/* 操作ヒント */
.hint {
  position: absolute;
  top: 8px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 12px;
  color: #7a6a5a;
  background: rgba(245,240,232,0.85);
  padding: 4px 14px;
  border-radius: 12px;
  pointer-events: none;
  z-index: 5;
  white-space: nowrap;
  transition: opacity 0.3s;
}
/* ミュートボタン */
#btn-mute {
  position: absolute;
  top: 8px;
  right: 8px;
  background: rgba(245,240,232,0.85);
  border: 1px solid #d4c9b8;
  border-radius: 50%;
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 16px;
  z-index: 5;
}

/* === TOOLBAR === */
.toolbar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 8px 16px;
  background: #f5f0e8;
  border-top: 1px solid #d4c9b8;
  z-index: 10;
}
.tool-btn {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 13px;
  padding: 6px 14px;
  border: 1px solid #c4b8a6;
  border-radius: 6px;
  background: #faf6ef;
  color: #5a4a3a;
  cursor: pointer;
  transition: all 0.2s;
  user-select: none;
}
.tool-btn:hover { background: #e8e0d2; }
.tool-btn.active {
  background: #a23d2a;
  color: #fff;
  border-color: #a23d2a;
}
.tool-separator {
  width: 1px;
  height: 24px;
  background: #d4c9b8;
  margin: 0 4px;
}

/* === AI SPEECH BUBBLE === */
.ai-bubble {
  padding: 10px 20px;
  background: #faf6ef;
  border-top: 1px solid #d4c9b8;
  font-family: 'Noto Serif JP', serif;
  font-size: 14px;
  color: #5a4a3a;
  line-height: 1.8;
  min-height: 44px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.ai-icon {
  font-size: 20px;
  flex-shrink: 0;
}
.ai-text {
  flex: 1;
}

/* === GARDEN NAME === */
#garden-name-display {
  text-align: center;
  font-family: 'Noto Serif JP', serif;
  font-size: 16px;
  color: #7a6a5a;
  padding: 2px 0;
  min-height: 24px;
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header" id="header">
  <span class="header-title">心庭</span>
  <span class="header-subtitle">— こころにわ —</span>
  <div class="header-actions">
    <button class="header-btn" id="btn-help" title="ヘルプ">?</button>
    <button class="header-btn" id="btn-share" title="共有">共有</button>
  </div>
</div>

<!-- GARDEN NAME -->
<div id="garden-name-display"></div>

<!-- 3D CANVAS -->
<div id="canvas-container">
  <div class="hint" id="hint">左クリック: 岩を置く ／ 右ドラッグ: 回転 ／ スクロール: ズーム</div>
  <button id="btn-mute" title="BGM ON/OFF">🔊</button>
</div>

<!-- TOOLBAR -->
<div class="toolbar" id="toolbar">
  <button class="tool-btn active" data-tool="rock">🪨 岩</button>
  <button class="tool-btn" data-tool="sand">🌀 砂紋</button>
  <button class="tool-btn" data-tool="moss">🌿 苔</button>
  <div class="tool-separator"></div>
  <button class="tool-btn" data-tool="select">👆 選択</button>
  <button class="tool-btn" id="btn-delete" style="display:none">🗑️ 削除</button>
  <button class="tool-btn" id="btn-reset">🔄 リセット</button>
  <div class="tool-separator"></div>
  <span id="sand-depth-control" style="display:none;align-items:center;gap:4px;font-size:12px;color:#7a6a5a">
    深さ:<input type="range" id="sand-depth" min="1" max="15" value="4" step="0.5" style="width:60px">
  </span>
  <div class="tool-separator"></div>
  <button class="tool-btn" id="btn-ai-explain">🧙 AI解説</button>
  <button class="tool-btn" id="btn-summon">👤 福岡さん召喚</button>
  <button class="tool-btn" id="btn-photo">📸 撮影</button>
</div>

<!-- AI BUBBLE -->
<div class="ai-bubble">
  <span class="ai-icon">🧙</span>
  <span class="ai-text" id="ai-text">庭を作る準備ができました。岩を置いてみてください。</span>
</div>

<script src="key.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script>
// === API KEY ===
// key.js から読み込み。ファイルがなければURLパラメータ ?key=xxx を使用
var API_KEY = typeof API_KEY_VALUE !== 'undefined' ? API_KEY_VALUE :
  new URLSearchParams(window.location.search).get('key') || '';

// === GAME PARAMETERS ===
const SAND_SIZE = 8;                // 砂地の一辺の長さ
const SAND_SEGMENTS = 128;          // 砂地の分割数（大きいほど砂紋が滑らか）
const SAND_COLOR = 0xede4cf;        // 砂地の色
const FRAME_COLOR = 0x3e2723;       // 木枠の色
const FRAME_HEIGHT = 0.2;           // 木枠の高さ
const FRAME_WIDTH = 0.3;            // 木枠の厚さ
const BG_COLOR = 0xf5f0e8;          // 背景色
const CAM_FOV = 50;                 // カメラ視野角
const CAM_NEAR = 0.1;               // カメラ近クリップ
const CAM_FAR = 100;                // カメラ遠クリップ
const CAM_INIT_X = 5;              // カメラ初期位置X
const CAM_INIT_Y = 5;              // カメラ初期位置Y
const CAM_INIT_Z = 5;              // カメラ初期位置Z
const ORBIT_MIN = 3;                // ズーム最小距離
const ORBIT_MAX = 15;               // ズーム最大距離
const ORBIT_MAX_POLAR = 1.5;        // 極角上限（地面より下を防ぐ）
const SUN_INTENSITY = 1.0;          // 太陽光の強さ
const SUN_X = 5;                    // 太陽光位置X
const SUN_Y = 10;                   // 太陽光位置Y
const SUN_Z = 5;                    // 太陽光位置Z
const AMBIENT_INTENSITY = 0.4;      // 環境光の強さ
const ROCK_MIN_RADIUS = 0.3;        // 岩の最小サイズ
const ROCK_MAX_RADIUS = 0.6;        // 岩の最大サイズ
const ROCK_MIN_SCALE = 0.7;         // 岩の最小スケール
const ROCK_MAX_SCALE = 1.3;         // 岩の最大スケール
const ROCK_COLOR_MIN = 0x6b6760;    // 岩の色（暗い方）
const ROCK_COLOR_MAX = 0x8a7f72;    // 岩の色（明るい方）
const MAX_ROCKS = 20;               // 岩の最大配置数
const SAND_DEFORM_RADIUS = 0.08;   // 砂紋の影響半径
let sandDeformDepth = -0.008;      // 砂紋の最大凹み量（スライダーで変更可）
const MOSS_COLOR = 0x4a6b3a;       // 苔の色
const MOSS_RADIUS = 0.12;          // 苔の球のサイズ
const MOSS_CLUSTER_SIZE = 5;       // 苔1箇所あたりの球の数
const SELECT_COLOR = 0xa23d2a;     // 選択中のハイライト色

// === STATE ===
let currentTool = 'rock';
let gardenName = '';
let rocks = [];
let sandPatterns = 0;
let mossObjects = [];
let scene, camera, renderer, controls;
let sandMesh, sandGeometry;
let animationId = null;
let raycaster = new THREE.Raycaster();
let mouse = new THREE.Vector2();
let isDragging = false;
let isSandDrawing = false;
let selectedRock = null;
let selectedRockOriginalColor = null;
let fukuokaAvatar = null;
let autoCirclesAdded = new Set(); // 岩の周囲に自動砂紋を追加済みか追跡

// === THREE.JS INIT ===
function initScene() {
  const container = document.getElementById('canvas-container');
  const w = container.clientWidth;
  const h = container.clientHeight;

  // Scene
  scene = new THREE.Scene();
  scene.background = new THREE.Color(BG_COLOR);

  // Camera
  camera = new THREE.PerspectiveCamera(CAM_FOV, w / h, CAM_NEAR, CAM_FAR);
  camera.position.set(CAM_INIT_X, CAM_INIT_Y, CAM_INIT_Z);
  camera.lookAt(0, 0, 0);

  // Renderer
  renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
  renderer.setSize(w, h);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.outputEncoding = THREE.sRGBEncoding;
  container.appendChild(renderer.domElement);

  // Lights
  const dirLight = new THREE.DirectionalLight(0xffffff, SUN_INTENSITY);
  dirLight.position.set(SUN_X, SUN_Y, SUN_Z);
  dirLight.castShadow = true;
  dirLight.shadow.mapSize.width = 2048;
  dirLight.shadow.mapSize.height = 2048;
  dirLight.shadow.camera.near = 0.5;
  dirLight.shadow.camera.far = 30;
  dirLight.shadow.camera.left = -6;
  dirLight.shadow.camera.right = 6;
  dirLight.shadow.camera.top = 6;
  dirLight.shadow.camera.bottom = -6;
  scene.add(dirLight);

  const ambLight = new THREE.AmbientLight(0xffffff, AMBIENT_INTENSITY);
  scene.add(ambLight);

  // Sand plane
  sandGeometry = new THREE.PlaneGeometry(SAND_SIZE, SAND_SIZE, SAND_SEGMENTS, SAND_SEGMENTS);
  sandGeometry.rotateX(-Math.PI / 2);
  const sandMaterial = new THREE.MeshStandardMaterial({
    color: SAND_COLOR,
    roughness: 0.9,
    metalness: 0.0,
    vertexColors: true
  });
  sandMesh = new THREE.Mesh(sandGeometry, sandMaterial);
  sandMesh.receiveShadow = true;
  scene.add(sandMesh);
  // vertex color初期化（砂地の色で塗る）
  const vCount = sandGeometry.attributes.position.count;
  const colors = new Float32Array(vCount * 3);
  const baseCol = new THREE.Color(SAND_COLOR);
  for (let i = 0; i < vCount; i++) {
    colors[i * 3] = baseCol.r;
    colors[i * 3 + 1] = baseCol.g;
    colors[i * 3 + 2] = baseCol.b;
  }
  sandGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

  // Wooden frame (4 sides)
  const frameMat = new THREE.MeshStandardMaterial({ color: FRAME_COLOR, roughness: 0.85 });
  const half = SAND_SIZE / 2;

  const frameConfigs = [
    { w: SAND_SIZE + FRAME_WIDTH * 2, h: FRAME_HEIGHT, d: FRAME_WIDTH, x: 0, z: -half - FRAME_WIDTH / 2 },
    { w: SAND_SIZE + FRAME_WIDTH * 2, h: FRAME_HEIGHT, d: FRAME_WIDTH, x: 0, z: half + FRAME_WIDTH / 2 },
    { w: FRAME_WIDTH, h: FRAME_HEIGHT, d: SAND_SIZE, x: -half - FRAME_WIDTH / 2, z: 0 },
    { w: FRAME_WIDTH, h: FRAME_HEIGHT, d: SAND_SIZE, x: half + FRAME_WIDTH / 2, z: 0 }
  ];
  frameConfigs.forEach(cfg => {
    const geo = new THREE.BoxGeometry(cfg.w, cfg.h, cfg.d);
    const mesh = new THREE.Mesh(geo, frameMat);
    mesh.position.set(cfg.x, cfg.h / 2, cfg.z);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    scene.add(mesh);
  });

  // OrbitControls — right-click drag to rotate, scroll to zoom
  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.minDistance = ORBIT_MIN;
  controls.maxDistance = ORBIT_MAX;
  controls.maxPolarAngle = ORBIT_MAX_POLAR;
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.target.set(0, 0, 0);
  controls.mouseButtons = {
    LEFT: null,
    MIDDLE: THREE.MOUSE.DOLLY,
    RIGHT: THREE.MOUSE.ROTATE
  };
  controls.touches = {
    ONE: null,
    TWO: THREE.TOUCH.DOLLY_ROTATE
  };

  // Resize handler
  window.addEventListener('resize', onResize);

  // Mouse handlers for tools (capture phase to bypass OrbitControls)
  const canvas = renderer.domElement;
  canvas.addEventListener('pointerdown', onCanvasPointerDown, true);
  canvas.addEventListener('pointermove', onCanvasPointerMove, true);
  canvas.addEventListener('pointerup', onCanvasPointerUp, true);
  canvas.addEventListener('click', onCanvasClick);

  // Prevent context menu on right-click
  renderer.domElement.addEventListener('contextmenu', e => e.preventDefault());
}

function onCanvasClick(event) {
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);

  if (currentTool === 'rock') {
    const hits = raycaster.intersectObject(sandMesh);
    if (hits.length > 0) placeRock(hits[0].point.x, hits[0].point.z);
  } else if (currentTool === 'moss') {
    const hits = raycaster.intersectObject(sandMesh);
    if (hits.length > 0) placeMoss(hits[0].point.x, hits[0].point.z);
  } else if (currentTool === 'select') {
    if (selectedRock) {
      selectedRock.mesh.material.color.copy(selectedRockOriginalColor);
      selectedRock = null;
      selectedRockOriginalColor = null;
    }
    const rockMeshes = rocks.map(r => r.mesh);
    const hits = raycaster.intersectObjects(rockMeshes);
    if (hits.length > 0) {
      const hitMesh = hits[0].object;
      const rockData = rocks.find(r => r.mesh === hitMesh);
      if (rockData) {
        selectedRock = rockData;
        selectedRockOriginalColor = hitMesh.material.color.clone();
        hitMesh.material.color.set(SELECT_COLOR);
        document.getElementById('btn-delete').style.display = 'inline-block';
      }
    } else {
      document.getElementById('btn-delete').style.display = 'none';
    }
  }
}

function placeRock(x, z) {
  if (rocks.length >= MAX_ROCKS) {
    setAIText('これ以上は置けません。まずは今の庭を味わってみてください。');
    return;
  }

  const radius = ROCK_MIN_RADIUS + Math.random() * (ROCK_MAX_RADIUS - ROCK_MIN_RADIUS);
  const geo = new THREE.IcosahedronGeometry(radius, 0);

  const cMin = new THREE.Color(ROCK_COLOR_MIN);
  const cMax = new THREE.Color(ROCK_COLOR_MAX);
  const rockColor = cMin.clone().lerp(cMax, Math.random());

  const mat = new THREE.MeshStandardMaterial({
    color: rockColor,
    roughness: 0.9,
    flatShading: true
  });

  const rock = new THREE.Mesh(geo, mat);
  rock.position.set(x, radius * 0.4, z);
  rock.rotation.y = Math.random() * Math.PI * 2;

  const s = ROCK_MIN_SCALE + Math.random() * (ROCK_MAX_SCALE - ROCK_MIN_SCALE);
  rock.scale.set(s, s * (0.6 + Math.random() * 0.4), s);

  rock.castShadow = true;
  rock.receiveShadow = true;
  scene.add(rock);

  rocks.push({ mesh: rock, x: x, z: z, size: radius * s });
  playRockSound();
  // 岩の周囲に自動で同心円砂紋を追加
  addAutoCirclesAroundRock({ x: x, z: z, size: radius * s }, rocks.length - 1);
}

// === SAND PATTERN DRAWING ===
const GROOVE_COLOR = new THREE.Color(0x8c7a5a); // 砂紋の濃い色
function deformSand(cx, cz, radius, depth) {
  const pos = sandGeometry.attributes.position;
  const col = sandGeometry.attributes.color;
  const baseCol = new THREE.Color(SAND_COLOR);
  for (let i = 0; i < pos.count; i++) {
    const vx = pos.getX(i);
    const vz = pos.getZ(i);
    const dx = vx - cx;
    const dz = vz - cz;
    const dist = Math.sqrt(dx * dx + dz * dz);
    if (dist < radius) {
      const t = 1 - dist / radius;
      const currentY = pos.getY(i);
      pos.setY(i, currentY + depth * t * t);
      // 溝の中心ほど濃い色に
      const blend = t * t;
      const r = baseCol.r * (1 - blend) + GROOVE_COLOR.r * blend;
      const g = baseCol.g * (1 - blend) + GROOVE_COLOR.g * blend;
      const b = baseCol.b * (1 - blend) + GROOVE_COLOR.b * blend;
      col.setXYZ(i, r, g, b);
    }
  }
  pos.needsUpdate = true;
  col.needsUpdate = true;
  sandGeometry.computeVertexNormals();
}

function drawSandGroove(cx, cz) {
  deformSand(cx, cz, SAND_DEFORM_RADIUS, sandDeformDepth);
  sandPatterns++;
  playSandSound();
}

function addAutoCirclesAroundRock(rockData, rockIndex) {
  if (autoCirclesAdded.has(rockIndex)) return;
  autoCirclesAdded.add(rockIndex);
  const half = SAND_SIZE / 2;
  const ringCount = 3 + Math.floor(Math.random() * 3);
  for (let r = 0; r < ringCount; r++) {
    const ringRadius = rockData.size * 1.5 + r * 0.4;
    const grooveWidth = 0.05 + Math.random() * 0.03;
    const grooveDepth = -0.02 - Math.random() * 0.02;
    const segments = 64;
    for (let s = 0; s < segments; s++) {
      const angle = (s / segments) * Math.PI * 2;
      const gx = rockData.x + Math.cos(angle) * ringRadius;
      const gz = rockData.z + Math.sin(angle) * ringRadius;
      if (Math.abs(gx) < half - 0.1 && Math.abs(gz) < half - 0.1) {
        deformSand(gx, gz, grooveWidth, grooveDepth);
      }
    }
  }
  sandPatterns += ringCount;
}

function onCanvasPointerDown(event) {
  if (event.button !== 0) return;
  if (currentTool === 'sand') {
    isSandDrawing = true;
    handleSandDraw(event);
    event.stopPropagation(); // OrbitControlsに渡さない
  }
}

function onCanvasPointerMove(event) {
  if (isSandDrawing && currentTool === 'sand') {
    handleSandDraw(event);
    event.stopPropagation();
  }
}

function onCanvasPointerUp(event) {
  isSandDrawing = false;
}

function handleSandDraw(event) {
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObject(sandMesh);
  if (hits.length > 0) {
    drawSandGroove(hits[0].point.x, hits[0].point.z);
  }
}

function placeMoss(x, z) {
  const group = new THREE.Group();
  for (let i = 0; i < MOSS_CLUSTER_SIZE; i++) {
    const r = MOSS_RADIUS * (0.5 + Math.random() * 0.8);
    const geo = new THREE.SphereGeometry(r, 8, 6);
    const mat = new THREE.MeshStandardMaterial({
      color: new THREE.Color(MOSS_COLOR).offsetHSL(0, 0, (Math.random() - 0.5) * 0.1),
      roughness: 1.0
    });
    const ball = new THREE.Mesh(geo, mat);
    ball.position.set(
      (Math.random() - 0.5) * 0.3,
      r * 0.3,
      (Math.random() - 0.5) * 0.3
    );
    ball.castShadow = true;
    group.add(ball);
  }
  group.position.set(x, 0, z);
  scene.add(group);
  mossObjects.push({ group: group, x: x, z: z });
  playMossSound();
}

// === AUDIO (Web Audio API) ===
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playRockSound() {
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(220, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(80, ctx.currentTime + 0.15);
  gain.gain.setValueAtTime(0.3, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(ctx.currentTime);
  osc.stop(ctx.currentTime + 0.2);
}

function playSandSound() {
  const ctx = getAudioCtx();
  const bufferSize = ctx.sampleRate * 0.08;
  const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
  }
  const source = ctx.createBufferSource();
  source.buffer = buffer;
  const gain = ctx.createGain();
  gain.gain.setValueAtTime(0.06, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
  const filter = ctx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = 2000;
  source.connect(filter);
  filter.connect(gain);
  gain.connect(ctx.destination);
  source.start();
}

function playMossSound() {
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(440, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(660, ctx.currentTime + 0.1);
  gain.gain.setValueAtTime(0.1, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + 0.15);
}

function typewriteAIText(text, speed) {
  speed = speed || 50;
  const el = document.getElementById('ai-text');
  el.textContent = '';
  let i = 0;
  function next() {
    if (i < text.length) {

      setTimeout(next, speed);

  }

const FALLBACK_EXPLANATIONS = [
  "静寂の中に、確かな存在感がございますな。",

let aiAbortController = null;
let aiBusy = false;

async function explainGarden() {
  if (aiBusy) {
    if (aiAbortController) aiAbortController.abort();
  }
  aiBusy = true;
  setAIText('……');

  const sceneState = {
    rocks: rocks.map(r => ({ x: r.x, z: r.z, size: r.size })),
    sandPatterns: sandPatterns,
    mossCount: mossObjects.length
  };

  const prompt = buildExplainPrompt(sceneState);

  if (API_KEY === 'YOUR_KEY_HERE' || !API_KEY) {
    setTimeout(() => {
      const msg = FALLBACK_EXPLANATIONS[Math.floor(Math.random() * FALLBACK_EXPLANATIONS.length)];
      typewriteAIText(msg);
      playBellSound();
      aiBusy = false;
    }, 600);
    return;
  }

  aiAbortController = new AbortController();

  try {
    const timeoutId = setTimeout(() => aiAbortController.abort(), 5000);

    const response = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }],
          generationConfig: { temperature: 0.9, maxOutputTokens: 200 }
        }),
        signal: aiAbortController.signal
      }
    );

    clearTimeout(timeoutId);

    if (!response.ok) throw new Error('API error');
    const data = await response.json();
    const text = data.candidates[0].content.parts[0].text.trim();
    typewriteAIText(text);
    playBellSound();
  } catch (e) {
    if (e.name === 'AbortError') return;
    const msg = FALLBACK_EXPLANATIONS[Math.floor(Math.random() * FALLBACK_EXPLANATIONS.length)];
    typewriteAIText(msg);
    playBellSound();
  } finally {
    aiBusy = false;
  }
}

function buildExplainPrompt(state) {
  const rockLines = state.rocks.length > 0
    ? state.rocks.map(r => `  (${r.x.toFixed(1)}, ${r.z.toFixed(1)}) サイズ${r.size.toFixed(1)}`).join('\n')
    : '  なし';
  return `あなたは禅寺の老師です。以下の枯山水の配置を見て、2〜3文で庭の意味を詩的に解説してください。
専門用語を使いすぎず、でも格調高い日本語で。優しく、でも含蓄のある口調で。

岩の数: ${state.rocks.length}個
岩の配置（x, z座標、サイズ）:
${rockLines}
砂紋の本数: ${state.sandPatterns}本
苔の数: ${state.mossCount}個

2〜3文のみで返答してください。「」などの括弧は不要。`;
}

// === FUKUOKA AVATAR (GLB) ===
const gltfLoader = new THREE.GLTFLoader();
let avatarMixer = null;
let walkClip = null;
let danceClip = null;
let avatarModel = null;
let avatarScale = 0.01; // 読み込み後に自動計算
let avatarReady = false;
let walkAction = null;
let danceAction = null;

function calcAvatarScale(model) {
  const box = new THREE.Box3().setFromObject(model);
  const size = new THREE.Vector3();
  box.getSize(size);
  // 人型の高さを1.2ユニットにする（庭8x8に対して程よいサイズ）
  const targetHeight = 1.2;
  avatarScale = targetHeight / size.y;
  console.log('avatar native size:', size.x.toFixed(2), size.y.toFixed(2), size.z.toFixed(2), '→ scale:', avatarScale.toFixed(4));
}

// 事前読み込み
function preloadAvatar() {
  gltfLoader.load('rig/walk.glb', function(gltf) {
    avatarModel = gltf.scene;
    avatarModel.traverse(function(child) {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
      }
    });
    walkClip = gltf.animations && gltf.animations.length > 0 ? gltf.animations[0] : null;
    calcAvatarScale(avatarModel);
    avatarReady = true;
    console.log('walk.glb loaded, animations:', gltf.animations ? gltf.animations.length : 0);
  }, function(xhr) {
    if (xhr.total > 0) console.log('walk.glb ' + Math.round(xhr.loaded / xhr.total * 100) + '%');
  }, function(err) {
    console.warn('walk.glb load failed:', err);
  });

  gltfLoader.load('rig/dance.glb', function(gltf) {
    danceClip = gltf.animations && gltf.animations.length > 0 ? gltf.animations[0] : null;
    console.log('dance.glb loaded, animations:', gltf.animations ? gltf.animations.length : 0);
  }, undefined, function(err) {
    console.warn('dance.glb load failed:', err);
  });
}

// フォールバック（プリミティブ人型）
function createFallbackAvatar() {
  const group = new THREE.Group();
  const skinColor = 0xf5d0a9;
  const suitColor = 0x1a237e;
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.25, 14, 12), new THREE.MeshStandardMaterial({ color: skinColor, roughness: 0.7 }));
  head.position.y = 1.75; head.castShadow = true; group.add(head);
  const hair = new THREE.Mesh(new THREE.SphereGeometry(0.26, 14, 12, 0, Math.PI * 2, 0, Math.PI * 0.55), new THREE.MeshStandardMaterial({ color: 0x3e2723, roughness: 0.9 }));
  hair.position.y = 1.8; group.add(hair);
  const body = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.7, 0.3), new THREE.MeshStandardMaterial({ color: suitColor, roughness: 0.7 }));
  body.position.y = 1.2; body.castShadow = true; group.add(body);
  const armGeo = new THREE.BoxGeometry(0.14, 0.55, 0.14);
  const armMat = new THREE.MeshStandardMaterial({ color: suitColor, roughness: 0.7 });
  const la = new THREE.Mesh(armGeo, armMat); la.position.set(-0.35, 1.2, 0); la.castShadow = true; group.add(la);
  const ra = new THREE.Mesh(armGeo.clone(), armMat); ra.position.set(0.35, 1.2, 0); ra.castShadow = true; group.add(ra);
  const legGeo = new THREE.BoxGeometry(0.16, 0.6, 0.16);
  const legMat = new THREE.MeshStandardMaterial({ color: suitColor, roughness: 0.7 });
  const ll = new THREE.Mesh(legGeo, legMat); ll.position.set(-0.13, 0.55, 0); ll.castShadow = true; group.add(ll);
  const rl = new THREE.Mesh(legGeo.clone(), legMat); rl.position.set(0.13, 0.55, 0); rl.castShadow = true; group.add(rl);
  const tie = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.25, 0.04), new THREE.MeshStandardMaterial({ color: 0xc62828, roughness: 0.6 }));
  tie.position.set(0, 1.25, 0.16); group.add(tie);
  return group;
}

let avatarAnimPhase = 'none';
let avatarAnimTime = 0;

function startAvatarWalk() {
  if (fukuokaAvatar) { scene.remove(fukuokaAvatar); fukuokaAvatar = null; }
  avatarMixer = null; walkAction = null; danceAction = null;

  if (avatarReady && avatarModel) {
    fukuokaAvatar = avatarModel.clone();
    fukuokaAvatar.scale.set(avatarScale, avatarScale, avatarScale);
    fukuokaAvatar.position.set(0, 0, 3.5);
    // カメラ方向を向く
    fukuokaAvatar.rotation.y = Math.PI * 0.75;
    scene.add(fukuokaAvatar);

    if (walkClip) {
      avatarMixer = new THREE.AnimationMixer(fukuokaAvatar);
      walkAction = avatarMixer.clipAction(walkClip);
      walkAction.play();
    }
  } else {
    // フォールバック
    fukuokaAvatar = createFallbackAvatar();
    fukuokaAvatar.scale.set(0.5, 0.5, 0.5);
    fukuokaAvatar.position.set(0, 0, 3.8);
    fukuokaAvatar.lookAt(5, 0, 5);
    scene.add(fukuokaAvatar);
  }

  avatarAnimPhase = 'walk';
  avatarAnimTime = 0;
  setAIText('福岡俊弘様がお見えになりました……');
  playBellSound();
}

function startAvatarDance() {
  if (!fukuokaAvatar) return;
  if (danceClip && avatarMixer) {
    if (walkAction) walkAction.stop();
    danceAction = avatarMixer.clipAction(danceClip);
    danceAction.setLoop(THREE.LoopRepeat);
    danceAction.play();
  }
  avatarAnimPhase = 'dance';
  avatarAnimTime = 0;
  setAIText('福岡俊弘様、ブレイクダンスを披露！📸');
}

document.getElementById('btn-summon').addEventListener('click', startAvatarWalk);

function updateAvatarAnimation(dt) {
  if (!fukuokaAvatar || avatarAnimPhase === 'none') return;
  avatarAnimTime += dt;
  if (avatarMixer) avatarMixer.update(dt);

  if (avatarAnimPhase === 'walk') {
    const speed = 1.5;
    fukuokaAvatar.position.z -= speed * dt;
    if (fukuokaAvatar.position.z <= 0) {
      fukuokaAvatar.position.z = 0;
      avatarAnimPhase = 'idle';
      if (walkAction) walkAction.paused = true;
      setAIText('心より、この庭を拝見いたしました。見事でございます。');
    }
  } else if (avatarAnimPhase === 'dance') {
    // ダンスアニメーションはmixerが自動再生、5秒後に終了
    if (avatarAnimTime > 8) {
      avatarAnimPhase = 'idle';
      if (danceAction) danceAction.stop();
      if (walkAction) { walkAction.paused = false; walkAction.play(); }
      setAIText('素晴らしい演技でした。お見事！');
    }
  } else if (avatarAnimPhase === 'idle') {
    fukuokaAvatar.position.y = Math.sin(avatarAnimTime * 2) * 0.005;
  }
}

// === GARDEN NAMING ===
const FALLBACK_NAMES = [
  '静寂庭', '悟りの庭', '枯山水庭', '無心庭',
  '明月庭', '清風庭', '白雲庭', '翠苔庭',
  '寂然庭', '和敬庭', '一如庭', '幽玄庭'
];

async function nameGarden() {
  const sceneState = {
    rocks: rocks.map(r => ({ x: r.x, z: r.z, size: r.size })),
    sandPatterns: sandPatterns,
    mossCount: mossObjects.length
  };

  const prompt = `あなたは禅寺の老師です。以下の枯山水に詩的な名前を付けてください。
「○○庭」の形式で、8文字以内。名前だけを返してください。他の説明は不要。

岩の数: ${sceneState.rocks.length}個
砂紋の本数: ${sceneState.sandPatterns}本
苔の数: ${sceneState.mossCount}個`;

  if (API_KEY === 'YOUR_KEY_HERE' || !API_KEY) {
    gardenName = FALLBACK_NAMES[Math.floor(Math.random() * FALLBACK_NAMES.length)];
    document.getElementById('garden-name-display').textContent = '「' + gardenName + '」';
    return;
  }

  try {
    const response = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }],
          generationConfig: { temperature: 1.0, maxOutputTokens: 30 }
        }),
        signal: (typeof AbortSignal !== 'undefined' && AbortSignal.timeout) ? AbortSignal.timeout(3000) : undefined
      }
    );
    if (!response.ok) throw new Error('API error');
    const data = await response.json();
    let name = data.candidates[0].content.parts[0].text.trim();
    // 「○○庭」形式に整形
    name = name.replace(/^[「『【\s]+|[」』】\s.]+$/g, '');
    if (name.length > 12) name = name.substring(0, 12);
    gardenName = name;
  } catch (e) {
    gardenName = FALLBACK_NAMES[Math.floor(Math.random() * FALLBACK_NAMES.length)];
  }
  document.getElementById('garden-name-display').textContent = '「' + gardenName + '」';
}
